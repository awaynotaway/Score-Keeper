<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    
    <div class="container" width="200px">
        <div class="card shadow-sm" style="width: 500px;">
            <img src="pingpong.webp" class="card-img-top" alt="Ping Pong Image">
            <div class="card-body">
                <h5 class="card-title">Ping Pong Score Keeper</h5>
            </div>
        </div>
        <div class="card shadow-sm" style="width: 500px;">
        <h2>Player 1 <strong id="player1-score">0</strong> - <strong id="player2-score">0</strong> Player 2</h2>

        <h2>Playing to <select name="score" id="score">
            <option value= "10">10</option>
            <option value= "15">15</option>
            <option value= "20">20</option>
        </select></h2>
        <button id="player1-btn">+1 Player 1</button>
        <button id="player2-btn">+1 Player 2</button>
        <button id="reset-btn">Reset</button>
        </div>
  </div>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
