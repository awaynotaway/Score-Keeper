<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Score Keeper</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>

<div class="d-flex justify-content-center align-items-center vh-100">
    
    <div class="card shadow">
        <div class="card ">
        <!-- Image -->
            <img src="pingpong.webp" class="card-img-top" alt="Ping Pong">
            <p class="text-muted mb-2 title">Ping Pong Score Keeper</p>
        </div>
        <!-- Card Body -->
        <div class="card-body">

            <!-- Title -->
         
            <!-- Score -->
            <div class="score">0 to 0</div>

            <!-- Playing To -->
            <div class="mb-3">
                <strong>Playing To </strong>
                <select id="score" class="form-select d-inline-block w-auto">
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                </select>
            </div>

        </div>

        <!-- Buttons (full width, edge to edge) -->
        <div class="btn-group-custom d-flex">
            <button class="btn btn-success-custom flex-fill">+1 Player One</button>
            <button class="btn btn-primary flex-fill">+1 Player Two</button>
            <button class="btn btn-danger flex-fill">Reset</button>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
